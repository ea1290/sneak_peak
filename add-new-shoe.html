<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <form id="add-new-shoe-form">
        <div class="mb-3">
            <label for="brand" class="form-label">
                Brand
            </label>
            <input type="brand" class="form-control" name="brand" id="brand" placeholder="brand">
        </div>

        <select name="category" class="form-select" aria-label="Default select example">

            <option selected>Select category.....</option>
            <option value="1">Sneakers</option>
            <option value="2">Running</option>
            <option value="3">Slip-on/Casual
            <option value="3">M
            <option value="3">S
            </option>
        </select>
    

    <div class="mb-3">
        <label for="color" class="form-label">
            Color
        </label>
        <input type="color" class="form-control" name="color" id="color" placeholder="color">
    </div>

    <div class="mb-3">
        <label for="description" class="form-label">
            description
        </label>
        <input type="description" class="form-control" name="description" id="description" placeholder="description">
    </div>

    <div class="mb-3">
        <label for="imageUrl" class="form-label">
            imageUrl
        </label>
        <input type="imageUrl" class="form-control" name="imageUrl" id="imageUrl" placeholder="imageUrl">
    </div>

    </div>
    <div class="form-check mb-3">
        <input type="checkbox" value="true" class="form-check-input" name="inStock" id="checkDefault" placeholder="inStock">
        <label class="form-check-label" for="checkChecked">
            In Stock
        </label>
    </div>

    <div class="mb-3">
        <label for="model" class="form-label">
            model
        </label>
        <input type="model" class="form-control" name="model" id="model" placeholder="model">
    </div>

    <div class="mb-3">
        <label for="price" class="form-label">
            price
        </label>
        <input type="number" class="form-control" name="price" id="price" placeholder="price">
    </div>


    <button type="reset" class="btn btn-secondary">Clear</button>
    <button type="submit" class=" btn btn-dark">Save Data</button>


    </form>


    
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
        <script src="assets/css/js/add-new-shoe.js"></script>
</body>

</html>
